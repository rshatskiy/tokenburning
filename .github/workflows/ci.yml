name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - run: GOOS=windows GOARCH=amd64 go build ./...
      - run: GOOS=darwin GOARCH=arm64 go build ./...
