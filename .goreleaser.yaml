version: 2
project_name: tokenburning

before:
  hooks:
    - go mod tidy

builds:
  - id: tokenburning
    main: ./cmd/tokenburning
    binary: tokenburning
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/rshatskiy/tokenburning/internal/cli.version={{ .Version }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: rshatskiy
    name: tokenburning
  draft: false

changelog:
  use: github
  sort: asc
  filters:
    exclude: ['^docs:', '^test:', '^chore:']
